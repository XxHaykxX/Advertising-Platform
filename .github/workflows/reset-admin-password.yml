name: Reset admin password

# One-off, manually triggered. Upserts Setting[admin_password_hash] in the
# remote DB (same DATABASE_URL secret the deploy migrate step uses).
on:
  workflow_dispatch:
    inputs:
      password:
        description: New admin password
        required: true
        default: admin1234

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx prisma generate

      - name: Set admin password hash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PW: ${{ github.event.inputs.password }}
        run: |
          node -e '
            const bcrypt = require("bcryptjs");
            const { PrismaClient } = require("@prisma/client");
            (async () => {
              const prisma = new PrismaClient();
              const hash = await bcrypt.hash(process.env.PW, 10);
              await prisma.setting.upsert({
                where: { key: "admin_password_hash" },
                update: { value: hash },
                create: { key: "admin_password_hash", value: hash },
              });
              console.log("admin_password_hash updated");
              await prisma.$disconnect();
            })().catch((e) => { console.error(e); process.exit(1); });
          '
