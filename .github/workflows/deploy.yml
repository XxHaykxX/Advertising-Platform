name: Deploy to Hostinger

# Auto-deploy on push to main. Builds the Next.js standalone bundle on the
# runner, ships .next/standalone (custom unix-socket server + traced deps +
# public + static + prisma client) to the Hostinger Node app root over SSH,
# runs Prisma migrations on the server, then restarts the Passenger app.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone + Hostinger assets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build

      - name: Stage prisma for server-side migrate
        run: cp -r prisma .next/standalone/prisma

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pack bundle
        run: tar czf bundle.tgz -C .next/standalone .

      - name: Upload bundle
        run: |
          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            bundle.tgz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/deploy-bundle.tgz"

      - name: Replace app, migrate, restart
        run: |
          DEST='${{ secrets.DEPLOY_PATH }}'
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e
             export PATH=/opt/alt/alt-nodejs22/root/bin:\$PATH
             mkdir -p '$DEST'
             # wipe old app files but keep the runtime .env
             find '$DEST' -mindepth 1 -maxdepth 1 ! -name .env -exec rm -rf {} +
             tar xzf ~/deploy-bundle.tgz -C '$DEST'
             rm -f ~/deploy-bundle.tgz
             cd '$DEST'
             npx --yes prisma migrate deploy
             mkdir -p tmp && touch tmp/restart.txt
             echo DEPLOYED_OK"
